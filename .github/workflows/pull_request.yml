name: Smarthome Domain - Pull request validation

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality-checks:
        name: Validate and build library
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Analyze code conventions using ktlint
              id: ktlint
              run: ./gradlew ktlintCheck

            - name: Analyze code conventions using detekt
              id: detekt
              run: ./gradlew detekt

            - name: Verify code coverage using kover
              id: kover
              run: ./gradlew koverVerify
